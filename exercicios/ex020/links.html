<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitando Links</title>
    <style>
        body{font-family: sans-serif;}
    a{color: brown;
        text-decoration: none;
    }
    a:visited{
        color: violet;
    }
    .especial::before{content: '⟶';

    }
   .especial::after{content: '⟵';
    }
    a:hover{text-decoration: underline;
    color: black;}
    a:active{color: yellow;}
    a::after{content:[link];}
    </style>
</head>
<body>
    <h1>Personalizando links</h1>
    <ul>
        <li><a href="https://github.com/gustavoguanabara" rel="external" target="_blank">Repositório GitHub</a></li>
        <li><a class="especial" href="https://www.youtube.com/c/CursoemV%C3%ADdeo" rel="external" target="_blank">Canal do youtube</a></li>
        <li><a href="https://www.cursoemvideo.com/" rel="external" target="_blank">Site do CursoemVideo</a></li>
    </ul>
</body>
</html>
