<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <title>Tags HTML</title>
</head>
<body>
    <h1>Tags em HTML</h1>
    <p>Em HTML5, podemos inserir os elementos da lista a seguir. Passe o mouse sobre os termos para descobrir qual tag deverá utilizar em cada caso.</p>
    <ul type="square">
        <li><abbr title="Utilizando a tag &lt;p&gt;">Parágrafos</abbr></li>
        <li><abbr title="Utilizando a tag &lt;h1&gt;">Títulos</abbr></li>
        <li><abbr title="Utilizando a tag &lt;img&gt;">Imagens</abbr></li>
        <li><abbr title="Utilizando a tag &lt;abbr&gt;">Abreviaçoes</abbr></li>
        <li><abbr title="Utilizando a tag &lt;code&gt;">Códigos-fontes</abbr> </li>
        <li><abbr title="Utilizando a tag &lt;ol&gt;">lista numeradas</abbr></li>
        <li><abbr title="Utilizando a  tag &lt;ul&gt;">Listas com demarcaçoes</abbr></li>
    </ul>
</body>
</html>
